name: "CodeQL Advanced - NeOx-Ghost"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 18 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest # NeOx-Ghost build ortamı için sabitlendi
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual # Autobuild yerine manuel kontrol

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Stux6 Güvenlik Standartları: Gelişmiş güvenlik ve kalite sorgularını dahil et
        queries: security-extended,security-and-quality

    - name: Run Manual Build Steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        # NeOx-Ghost için build komutlarını buraya ekle
        # Örn: make clean && make all
        echo "Stux6 Build Process Starting..."
        make all 

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"